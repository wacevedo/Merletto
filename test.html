<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Framework Generativo Portolano V2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: 'Inter', sans-serif;
    }

    canvas {
      cursor: crosshair;
      transition: filter 0.3s;
    }

    .control-panel {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      border-left: 1px solid #334155;
    }

    input[type="range"] {
      accent-color: #f97316;
    }

    .node-counter {
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>

<body class="flex h-screen overflow-hidden">

  <!-- Area di Lavoro Principale -->
  <main class="flex-grow relative bg-slate-900 flex items-center justify-center p-8">
    <div id="canvas-container"
      class="relative bg-white/5 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden w-full h-full flex items-center justify-center">
      <!-- Overlay della Mappa Originale (Simulata) -->
      <div id="map-bg" class="absolute inset-0 opacity-20 pointer-events-none bg-center bg-no-repeat bg-contain"></div>
      <canvas id="mainCanvas"></canvas>
    </div>
  </main>

  <!-- Pannello di Controllo (Framework) -->
  <aside class="w-96 control-panel p-6 flex flex-col gap-6 shadow-2xl z-10">
    <header>
      <h1 class="text-2xl font-bold text-orange-500 uppercase tracking-tighter">Portolan Engine</h1>
      <p class="text-slate-400 text-xs italic">Generatore di Griglie Relazionali per il Design</p>
    </header>

    <hr class="border-slate-700">

    <!-- Parametri di Input -->
    <section class="space-y-4">
      <h2 class="text-sm font-bold text-slate-200 uppercase tracking-widest">Input: Nodi & Traiettorie</h2>

      <div>
        <label class="flex justify-between text-xs mb-2">Connessioni per Nodo: <span id="conn-val"
            class="text-orange-400 font-bold">2</span></label>
        <input type="range" id="connections-limit" min="1" max="5" value="2" class="w-full">
      </div>

      <div>
        <label class="flex justify-between text-xs mb-2">Tensione Rombica (Phi): <span id="phi-val"
            class="text-teal-400 font-bold">1.618</span></label>
        <input type="range" id="phi-tension" min="1000" max="2000" value="1618" class="w-full">
      </div>

      <div class="flex items-center gap-2">
        <input type="checkbox" id="show-map" checked class="w-4 h-4 rounded border-slate-700">
        <label for="show-map" class="text-xs">Mostra Mappa Storica</label>
      </div>
    </section>

    <!-- Analisi Output -->
    <section class="flex-grow space-y-4">
      <h2 class="text-sm font-bold text-slate-200 uppercase tracking-widest">Analisi Output</h2>
      <div class="grid grid-cols-2 gap-2">
        <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700">
          <span class="block text-[10px] text-slate-500 uppercase">Nodi Attivi</span>
          <span id="node-count" class="text-xl font-bold node-counter text-orange-400">0</span>
        </div>
        <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700">
          <span class="block text-[10px] text-slate-500 uppercase">Celle Generative</span>
          <span id="cell-count" class="text-xl font-bold node-counter text-teal-400">0</span>
        </div>
      </div>

      <div id="data-log"
        class="bg-black/40 p-3 rounded-lg border border-slate-800 h-32 overflow-y-auto font-mono text-[10px] text-teal-500/70">
        // In attesa di input...
      </div>
    </section>

    <!-- Azioni Esportazione -->
    <footer class="space-y-2">
      <button id="clearCanvas"
        class="w-full py-2 text-xs border border-slate-600 hover:bg-slate-800 rounded transition uppercase font-bold">Pulisci
        Framework</button>
      <button id="exportJSON"
        class="w-full py-3 bg-orange-600 hover:bg-orange-500 text-white rounded-lg transition font-bold shadow-lg">Esporta
        Coordinate (JSON)</button>
    </footer>
  </aside>

  <script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');
    const nodeCountDisplay = document.getElementById('node-count');
    const cellCountDisplay = document.getElementById('cell-count');
    const dataLog = document.getElementById('data-log');

    let nodes = [];
    let config = {
      connections: 2,
      phi: 1.618,
      showMap: true
    };

    function resize() {
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
      draw();
    }

    window.addEventListener('resize', resize);
    setTimeout(resize, 100);

    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      nodes.push({
        x: e.clientX - rect.left,
        y: e.clientY - rect.top,
        id: nodes.length
      });
      updateStats();
      draw();
    });

    document.getElementById('connections-limit').addEventListener('input', (e) => {
      config.connections = parseInt(e.target.value);
      document.getElementById('conn-val').innerText = config.connections;
      draw();
    });

    document.getElementById('phi-tension').addEventListener('input', (e) => {
      config.phi = e.target.value / 1000;
      document.getElementById('phi-val').innerText = config.phi.toFixed(3);
      draw();
    });

    document.getElementById('clearCanvas').addEventListener('click', () => {
      nodes = [];
      updateStats();
      draw();
    });

    function updateStats() {
      nodeCountDisplay.innerText = nodes.length;
      cellCountDisplay.innerText = Math.max(0, nodes.length - 1);
      if (nodes.length > 0) {
        const last = nodes[nodes.length - 1];
        dataLog.innerHTML += NODE_${ last.id } [${ Math.round(last.x) }, ${ Math.round(last.y) }] < br >;
        dataLog.scrollTop = dataLog.scrollHeight;
      } else {
        dataLog.innerHTML = "// In attesa di input...";
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (nodes.length < 1) return;

      // 1. Logica di connessione: Prossimità
      nodes.forEach((node, idx) => {
        // Calcola distanze verso tutti gli altri nodi
        let targets = nodes
          .filter(n => n !== node)
          .map(n => ({ node: n, dist: Math.hypot(n.x - node.x, n.y - node.y) }))
          .sort((a, b) => a.dist - b.dist)
          .slice(0, config.connections); // Prende i N più vicini

        targets.forEach(target => {
          const t = target.node;

          // Disegna Traiettoria Primaria (Tensione)
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(249, 115, 22, 0.6)';
          ctx.lineWidth = 1.5;
          ctx.moveTo(node.x, node.y);
          ctx.lineTo(t.x, t.y);
          ctx.stroke();

          // Disegna Logica Rombica Deformata
          drawRhombicCell(node, t);
        });
      });

      // 2. Disegna Nodi (Rose dei Venti)
      nodes.forEach(node => {
        ctx.beginPath();
        ctx.fillStyle = '#f97316';
        ctx.arc(node.x, node.y, 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.strokeStyle = 'rgba(249, 115, 22, 0.3)';
        ctx.lineWidth = 1;
        ctx.arc(node.x, node.y, 12, 0, Math.PI * 2);
        ctx.stroke();
      });
    }

    function drawRhombicCell(p1, p2) {
      const midX = (p1.x + p2.x) / 2;
      const midY = (p1.y + p2.y) / 2;
      const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
      const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);

      // Ampiezza del rombo guidata da Phi
      const offset = dist / (config.phi * 2.2);

      const v1x = midX + Math.cos(angle + Math.PI / 2) * offset;
      const v1y = midY + Math.sin(angle + Math.PI / 2) * offset;
      const v2x = midX + Math.cos(angle - Math.PI / 2) * offset;
      const v2y = midY + Math.sin(angle - Math.PI / 2) * offset;

      ctx.beginPath();
      ctx.strokeStyle = 'rgba(20, 184, 166, 0.4)';
      ctx.lineWidth = 1;
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(v1x, v1y);
      ctx.lineTo(p2.x, p2.y);
      ctx.lineTo(v2x, v2y);
      ctx.closePath();
      ctx.stroke();

      // Riempimento leggero della cella
      ctx.fillStyle = 'rgba(20, 184, 166, 0.03)';
      ctx.fill();
    }

    document.getElementById('exportJSON').addEventListener('click', () => {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(nodes, null, 2));
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href", dataStr);
      downloadAnchorNode.setAttribute("download", "griglia_portolana_export.json");
      document.body.appendChild(downloadAnchorNode);
      downloadAnchorNode.click();
      downloadAnchorNode.remove();
    });
  </script>
</body>

</html>
